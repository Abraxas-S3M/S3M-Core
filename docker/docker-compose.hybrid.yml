# S3M Hybrid Training — RunPod GPU → Cloudflare R2
# Usage on RunPod: docker compose -f docker/docker-compose.hybrid.yml --profile gpu up -d
version: "3.8"

services:
  s3m-gpu-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    container_name: s3m-gpu-worker
    profiles: ["gpu"]
    env_file:
      - ../.env.r2
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - S3M_DEVICE=cuda
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - WANDB_PROJECT=s3m-training
      - S3M_LOG_LEVEL=INFO
    volumes:
      - gpu-checkpoints:/opt/s3m/checkpoints
      - gpu-models:/opt/s3m/models
      - gpu-data:/opt/s3m/data
      - gpu-state:/opt/s3m/state
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["python3", "scripts/gpu_worker.py", "--poll-interval", "30"]
    restart: unless-stopped

  s3m-gpu-interactive:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    container_name: s3m-gpu-interactive
    profiles: ["interactive"]
    env_file:
      - ../.env.r2
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - S3M_DEVICE=cuda
      - WANDB_API_KEY=${WANDB_API_KEY:-}
    volumes:
      - gpu-checkpoints:/opt/s3m/checkpoints
      - gpu-models:/opt/s3m/models
      - gpu-data:/opt/s3m/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: /bin/bash
    stdin_open: true
    tty: true

volumes:
  gpu-checkpoints:
  gpu-models:
  gpu-data:
  gpu-state:
