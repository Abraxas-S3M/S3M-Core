# File: docker/docker-compose.cloud.yml
# S3M Cloud CPU Deployment — Hetzner
version: "3.8"

services:
  s3m-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    container_name: s3m-api
    env_file:
      - ../.env.cloud
    environment:
      - OMP_NUM_THREADS=2
      - MKL_NUM_THREADS=2
    ports:
      - "8080:8080"
    volumes:
      - s3m-data:/opt/s3m/data
      - s3m-state:/opt/s3m/state
      - s3m-models:/opt/s3m/models
    restart: unless-stopped

  s3m-trainer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    container_name: s3m-trainer
    env_file:
      - ../.env.cloud
    environment:
      - OMP_NUM_THREADS=6
      - MKL_NUM_THREADS=6
      - OPENBLAS_NUM_THREADS=6
      - NUMEXPR_NUM_THREADS=6
    command: ["python", "scripts/start_cloud_trainer.py"]
    volumes:
      - s3m-data:/opt/s3m/data
      - s3m-state:/opt/s3m/state
      - s3m-models:/opt/s3m/models
    restart: unless-stopped

volumes:
  s3m-data:
  s3m-state:
  s3m-models:
