# S3M Quad-Engine Architecture
# UNCLASSIFIED - FOUO

system: "S3M Sovereign Military AI"
version: "0.2.0"
architecture: "quad-engine-orchestrated"

engines:
  - id: phi3_medium
    role: "Tactical Edge Inference"
    model: "Microsoft Phi-3 Medium (14B)"
    strength: "Strong reasoning and math, edge-deployable with quantization"
    use_case: "Field queries, sitreps, quick decisions, tactical math"
    fp16_size_gb: 28
    q4_size_gb: 8.5

  - id: grok1
    role: "Complex Reasoning Engine"
    model: "xAI Grok-1 (314B MoE)"
    strength: "Massive MoE with deep multi-step reasoning"
    use_case: "Threat assessment, strategic analysis, wargaming"
    fp16_size_gb: 300
    q4_size_gb: 80
    notes: "Requires multi-GPU or dedicated server. Cannot run on edge hardware."

  - id: mixtral
    role: "Operations Planning Engine"
    model: "Mistral AI Mixtral 8x7B (46.7B MoE)"
    strength: "Efficient MoE, multilingual, strong instruction following"
    use_case: "Route planning, logistics, ops orders, code generation"
    fp16_size_gb: 93
    q4_size_gb: 26

  - id: allam
    role: "Arabic Language Intelligence"
    model: "SDAIA ALLaM-7B (7B)"
    strength: "Native Arabic NLP, MENA cultural context"
    use_case: "Arabic SIGINT, translation, cultural intel"
    fp16_size_gb: 14
    q4_size_gb: 4

data_flow:
  input: "User query or system trigger"
  step_1: "Orchestrator classifies task domain"
  step_2: "Routes to primary engine OR triggers consensus"
  step_3: "Engine processes via llama.cpp locally"
  step_4: "Response returned with metadata"
  step_5: "Logged for audit trail"

weight_management:
  source: "Open-source model repositories"
  vault: "Google Cloud Storage (gs://s3m-weight-vault)"
  deploy: "Local GGUF files on Jetson hardware"
  strategy: "Pull once, store forever, deploy anywhere"
