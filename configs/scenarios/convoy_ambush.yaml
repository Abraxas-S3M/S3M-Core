scenario:
  name: "Convoy Ambush — Route Bravo"
  type: "ambush"
  description: "6-vehicle convoy with 2 UAV escorts ambushed by enemy forces along supply route"
  terrain:
    bounds: [[0, 0, 0], [2000, 500, 150]]
    type: "desert_road"
    obstacles:
      - {position: [800, 250, 0], radius: 100, type: "canyon_narrows"}
      - {position: [1200, 200, 0], radius: 50, type: "rock_outcrop"}
  weather:
    visibility: 0.95
    wind_speed: 15.0
    wind_direction: 90
    precipitation: "none"
  forces:
    - name: "Blue Force — Convoy Alpha"
      allegiance: "friendly"
      units:
        - {type: "FRIENDLY_UGV", count: 6, position: [100, 250, 0], behavior: "convoy"}
        - {type: "FRIENDLY_UAV", count: 2, position: [100, 250, 80], behavior: "escort"}
    - name: "Red Force — Ambush Team"
      allegiance: "enemy"
      units:
        - {type: "ENEMY_INFANTRY", count: 12, position: [900, 100, 0], behavior: "ambush"}
        - {type: "ENEMY_UGV", count: 2, position: [1000, 400, 0], behavior: "block"}
        - {type: "ENEMY_UAV", count: 1, position: [1100, 250, 120], behavior: "recon"}
  objectives:
    - description: "Deliver convoy to destination"
      success_condition: "convoy_arrived"
      priority: 1
    - description: "Fewer than 2 friendly vehicle losses"
      success_condition: "friendly_losses < 2"
      priority: 2
  rules_of_engagement: "weapons_free"
  duration_seconds: 900
  parameters:
    convoy_route: [[100, 250, 0], [500, 250, 0], [1000, 250, 0], [1500, 250, 0], [1900, 250, 0]]
    convoy_speed: 8.0
    escort_altitude: 80
