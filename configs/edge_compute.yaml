# ── Feature 1: Edge CPU Network ──────────────────────────
edge_network:
  node_id: "auto"  # "auto" generates UUID on first boot
  cluster_name: "s3m-edge-cluster"
  discovery:
    method: "multicast"            # multicast | static | mdns
    multicast_group: "239.1.3.37"
    multicast_port: 5353
    static_peers: []               # list of "host:port" when method=static
    heartbeat_interval_seconds: 10
    node_timeout_seconds: 30

  # Federated Learning
  federated:
    enabled: true
    aggregation_strategy: "fedprox"  # fedavg | fedprox | scaffold | hierarchical
    rounds_per_cycle: 5
    local_epochs: 3
    learning_rate: 0.001
    mu: 0.01                         # FedProx proximal term weight
    min_nodes_for_aggregation: 2
    differential_privacy:
      enabled: true
      epsilon: 8.0
      delta: 1e-5
      max_grad_norm: 1.0
    compression:
      enabled: true
      method: "topk"                 # topk | random_sparsification | quantize
      sparsity: 0.9                  # keep top 10% of gradients

  # Self-Training (Noisy Student / Pseudo-Label)
  self_training:
    enabled: true
    strategy: "noisy_student"        # noisy_student | pseudo_label | co_training
    confidence_threshold: 0.85
    noise_augmentation:
      dropout_rate: 0.3
      gaussian_std: 0.05
      mixup_alpha: 0.2
    teacher_update_interval: 5       # re-distill teacher every N rounds
    max_pseudo_labels_per_cycle: 10000

  # Self-Replication
  replication:
    enabled: true
    max_replicas: 8
    distillation_ratio: 0.6          # student model is 60% of teacher params
    bootstrap_image: "s3m-edge-node:latest"
    container_runtime: "docker"      # docker | podman | firecracker
    resource_limits:
      cpu_cores: 4
      memory_mb: 4096
      disk_mb: 8192

  # Autonomous Data Generation
  data_generation:
    enabled: true
    strategies:
      - "contrastive_augmentation"
      - "generative_replay"
      - "active_learning"
      - "entity_linking"
    knowledge_graph:
      backend: "sqlite"              # sqlite | neo4j | dgraph
      db_path: "data/edge/knowledge.db"
    active_learning:
      query_strategy: "uncertainty"   # uncertainty | diversity | expected_model_change
      pool_size: 50000
      query_batch_size: 500
    output_dir: "data/edge/generated/"

  # Sandbox Environment
  sandbox:
    enabled: true
    runtime: "docker"                 # docker | podman | firecracker
    base_image: "s3m-sandbox:latest"
    network_isolation: true
    resource_limits:
      cpu_cores: 2
      memory_mb: 2048
      gpu_passthrough: false
    parameters:
      # Togglable at runtime via REST/gRPC control plane
      training_enabled: true
      inference_enabled: true
      data_generation_enabled: true
      replication_enabled: false
      max_inference_batch: 32
      temperature: 0.7
    control_api:
      host: "0.0.0.0"
      port: 9090
      auth_token: ""                  # set at deploy time

# ── Feature 2: Heterogeneous Compute (GPU↔CPU) ──────────
heterogeneous_compute:
  enabled: true
  scheduling_policy: "adaptive"       # adaptive | prefer_gpu | prefer_cpu | round_robin

  device_profiles:
    cpu:
      max_batch_size: 8
      optimal_ops: ["tokenization", "preprocessing", "postprocessing", "io", "evaluation"]
      thread_pool_size: 8
    gpu:
      max_batch_size: 64
      optimal_ops: ["matmul", "conv", "attention", "training_step", "embedding"]
      memory_reserve_mb: 512

  # Adaptive RL Scheduler
  adaptive_scheduler:
    enabled: true
    warmup_steps: 50
    exploration_rate: 0.1
    learning_rate: 0.01
    reward_weights:
      latency: 0.4
      throughput: 0.3
      memory_efficiency: 0.2
      power_efficiency: 0.1
    history_window: 100

  # Bridge for remote offloading
  offload_bridge:
    enabled: true
    vault_endpoint: ""           # Local vault IP:port
    gpu_endpoint: ""             # RunPod IP:port (when active)
    cpu_endpoint: ""             # Hetzner CCX33 IP:port
    transport: "grpc"
    encryption: true
    max_payload_mb: 512
    timeout_seconds: 60
    vault_sync:
      enabled: true
      protocol: "rsync+ssh"
      interval_minutes: 30

  # Unified Memory / Zero-Copy
  memory:
    use_unified_memory: true          # CUDA Unified Memory when available
    use_pinned_memory: true           # pinned host memory for fast H2D/D2H
    prefetch_policy: "on_demand"      # on_demand | eager | none
