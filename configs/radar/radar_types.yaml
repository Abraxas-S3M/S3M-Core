# Tactical radar type library for S3M Radar Adapter Framework.
# Military context:
# Values here support offline deployment planning by defining baseline
# characteristics for mixed-radar command-post integration.

radar_types:
  RPS_82:
    name_en: "RPS-82 Portable Radar"
    name_ar: "رادار آر بي إس-82 المحمول"
    band: "X_BAND"
    dimensions: "2D"
    min_range_m: 200.0
    max_range_m: 32000.0
    scan_rate_hz: 1.2
    beam_width_az_deg: 2.4
    beam_width_el_deg: 6.0
    doppler_resolution_mps: 0.8
    detection_probability_curve:
      - [0.0, 0.20]
      - [6.0, 0.55]
      - [12.0, 0.85]
      - [18.0, 0.95]

  RPS_202:
    name_en: "RPS-202 Vehicle Radar"
    name_ar: "رادار آر بي إس-202 المركب على مركبة"
    band: "S_BAND"
    dimensions: "3D"
    min_range_m: 300.0
    max_range_m: 75000.0
    scan_rate_hz: 1.0
    beam_width_az_deg: 1.4
    beam_width_el_deg: 2.8
    doppler_resolution_mps: 0.45
    detection_probability_curve:
      - [0.0, 0.30]
      - [6.0, 0.65]
      - [12.0, 0.90]
      - [18.0, 0.97]

  WESTERN_AESA:
    name_en: "Western AESA Class Radar"
    name_ar: "رادار غربي من فئة مصفوفة المسح الإلكتروني"
    representative_models:
      - "AN/TPS-80"
      - "Giraffe"
      - "TRML-4D"
    band: "S_BAND"
    dimensions: "3D"
    min_range_m: 500.0
    max_range_m: 120000.0
    scan_rate_hz: 1.6
    beam_width_az_deg: 1.0
    beam_width_el_deg: 2.0
    doppler_resolution_mps: 0.3
    detection_probability_curve:
      - [0.0, 0.35]
      - [6.0, 0.72]
      - [12.0, 0.94]
      - [18.0, 0.99]

  GENERIC_2D:
    name_en: "Generic 2D Surveillance Radar"
    name_ar: "رادار مراقبة ثنائي الأبعاد عام"
    band: "X_BAND"
    dimensions: "2D"
    min_range_m: 150.0
    max_range_m: 40000.0
    scan_rate_hz: 1.0
    beam_width_az_deg: 2.0
    beam_width_el_deg: 5.0
    doppler_resolution_mps: 1.0

  GENERIC_3D:
    name_en: "Generic 3D Surveillance Radar"
    name_ar: "رادار مراقبة ثلاثي الأبعاد عام"
    band: "C_BAND"
    dimensions: "3D"
    min_range_m: 200.0
    max_range_m: 60000.0
    scan_rate_hz: 0.9
    beam_width_az_deg: 1.8
    beam_width_el_deg: 3.5
    doppler_resolution_mps: 0.7
