# S3M Phase 21 Austere Edge Runtime defaults
# UNCLASSIFIED - FOUO
runtime:
  queue_db_path: "data/edge_runtime/outbound_queue.db"

hardware_thresholds:
  cpu_standard_min_memory_mb: 16384
  fixed_site_min_memory_mb: 32768

degradation:
  full_edge:
    max_concurrent_models: 4
    allow_gpu: true
    allow_large_transfers: true
    summarization_interval: 120
    max_frame_rate: 30
    queue_outbound: false
  cpu_constrained:
    max_concurrent_models: 1
    allow_gpu: false
    allow_large_transfers: false
    summarization_interval: 45
    max_frame_rate: 10
    queue_outbound: true
  intermittent_link:
    max_concurrent_models: 2
    allow_gpu: true
    allow_large_transfers: false
    summarization_interval: 30
    max_frame_rate: 8
    queue_outbound: true
  offline_survival:
    max_concurrent_models: 1
    allow_gpu: false
    allow_large_transfers: false
    summarization_interval: 20
    max_frame_rate: 5
    queue_outbound: true

queue:
  claim_batch_size: 32
  reconcile_max_batches: 8

bearer_scoring:
  latency_weight: 0.35
  jitter_weight: 0.20
  loss_weight: 0.30
  bandwidth_weight: 0.15
