# S3M Quad-Engine Configuration
# UNCLASSIFIED - FOUO

engines:
  phi3_medium:
    name: "Phi-3 Medium"
    provider: "Microsoft"
    parameters: "14B"
    quantization: "Q4_K_M"
    runtime: "llama.cpp"
    source: "huggingface"
    hf_repo: "microsoft/Phi-3-medium-4k-instruct"
    gcs_bucket: "gs://s3m-weight-vault/phi3-medium/"
    local_path: "models/phi3-medium/phi-3-medium-4k-instruct.Q4_K_M.gguf"
    domain: "tactical"
    context_window: 4096
    max_tokens: 512

  grok1:
    name: "Grok-1"
    provider: "xAI"
    parameters: "314B (MoE)"
    quantization: "Q4_K_M"
    runtime: "llama.cpp"
    source: "huggingface"
    hf_repo: "xai-org/grok-1"
    gcs_bucket: "gs://s3m-weight-vault/grok1/"
    local_path: "models/grok1/grok-1.Q4_K_M.gguf"
    domain: "reasoning"
    context_window: 4096
    max_tokens: 1024

  mixtral:
    name: "Mixtral 8x7B"
    provider: "Mistral AI"
    parameters: "46.7B (MoE)"
    quantization: "Q4_K_M"
    runtime: "llama.cpp"
    source: "huggingface"
    hf_repo: "mistralai/Mixtral-8x7B-Instruct-v0.1"
    gcs_bucket: "gs://s3m-weight-vault/mixtral/"
    local_path: "models/mixtral/mixtral-8x7b-instruct-v0.1.Q4_K_M.gguf"
    domain: "planning"
    context_window: 4096
    max_tokens: 1024

  allam:
    name: "ALLaM-7B"
    provider: "SDAIA"
    parameters: "7B"
    quantization: "Q4_K_M"
    runtime: "llama.cpp"
    source: "huggingface"
    hf_repo: "humain-ai/ALLaM-7B-Instruct-preview"
    gcs_bucket: "gs://s3m-weight-vault/allam/"
    local_path: "models/allam/allam-7b-instruct.Q4_K_M.gguf"
    domain: "arabic_nlp"
    context_window: 4096
    max_tokens: 1024

weight_vault:
  primary: "google_cloud_storage"
  bucket: "s3m-weight-vault"
  region: "me-central1"
  local_mirror: "./models/"
  sync_strategy: "pull-on-deploy"
