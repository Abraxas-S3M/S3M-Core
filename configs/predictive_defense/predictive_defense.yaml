# S3M Predictive Threat Trajectory Engine configuration.
# Military context:
# This profile prioritizes early intercept geometry for dense UAV swarm threats.

predictive_defense:
  enabled: true
  cycle_period_s: 2.0
  refresh_horizons_s: [30, 60, 120]

  defended_asset:
    name_en: "ARAMCO Abqaiq Facility"
    name_ar: "منشأة أرامكو بقيق"
    position_m: [0.0, 0.0, 0.0]

  bridge:
    history_limit: 20

  genome_correlation:
    match_threshold: 0.30
    max_temporal_gap_hours: 720.0
    max_geo_distance_m: 50000.0

  trajectory_predictor:
    windows_s: [30, 60, 120]
    top_hypotheses_per_window: 3
    doctrine_bias:
      uav: 1.10
      missile: 1.20

  swarm_analyzer:
    min_swarm_size: 3
    cluster_distance_m: 5000.0
    saturation_threshold: 8

  preposition_optimizer:
    arrival_buffer_s: 5.0
    intercept_window_half_width_s: 10.0

  interceptors:
    - interceptor_id: "titan-01"
      name_en: "Titan Interceptor 01"
      name_ar: "معترض تيتان 01"
      position_m: [-9000.0, -1500.0, 120.0]
      max_speed_mps: 90.0
      readiness: 1.0
    - interceptor_id: "titan-02"
      name_en: "Titan Interceptor 02"
      name_ar: "معترض تيتان 02"
      position_m: [-8500.0, 1500.0, 120.0]
      max_speed_mps: 90.0
      readiness: 1.0
    - interceptor_id: "titan-03"
      name_en: "Titan Interceptor 03"
      name_ar: "معترض تيتان 03"
      position_m: [-7600.0, -3200.0, 120.0]
      max_speed_mps: 88.0
      readiness: 1.0
    - interceptor_id: "titan-04"
      name_en: "Titan Interceptor 04"
      name_ar: "معترض تيتان 04"
      position_m: [-7300.0, 3200.0, 120.0]
      max_speed_mps: 88.0
      readiness: 1.0
    - interceptor_id: "titan-05"
      name_en: "Titan Interceptor 05"
      name_ar: "معترض تيتان 05"
      position_m: [-6500.0, 0.0, 120.0]
