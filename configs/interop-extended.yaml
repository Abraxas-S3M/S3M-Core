# S3M Phase 16 — Interoperability & Simulation Standards (Extended)
# UNCLASSIFIED - FOUO

dis:
  broadcast_address: "255.255.255.255"
  port: 3000
  default_exercise_id: 1
  site_id: 1
  application_id: 1
  country_code: 178  # Saudi Arabia
  protocol_version: 7
  heartbeat_interval_seconds: 5
  dead_reckoning_algorithm: 2  # FPW
  position_threshold_meters: 1.0
  orientation_threshold_radians: 0.05
  max_entities: 5000
  pdu_types_enabled: [1, 2, 3, 13, 14, 22, 26]

jreap:
  enabled: false
  listen_port: 5555
  supported_j_series: ["J2.2", "J3.2", "J3.5", "J13.2"]
  crossfeed_to_cot: true
  crossfeed_to_dis: true

oth_gold:
  enabled: false
  gateway_url: null
  publish_interval_seconds: 15
  enforce_maritime_only: true

c2sim:
  server_url: null  # Set when C2SIM server is deployed
  namespace: "http://www.sisostds.org/schemas/C2SIM/1.1"
  outbox_dir: "data/interop/c2sim_outbox/"
  inbox_dir: "data/interop/c2sim_inbox/"
  auto_send: true

cot:
  multicast_address: "239.2.3.1"
  multicast_port: 6969
  tak_server_url: null
  tak_protocol_version: 0
  stale_seconds: 120
  publish_interval_seconds: 5
  callsign_prefix: "S3M"
  dis_crossfeed_enabled: true
  outbox_dir: "data/interop/cot_outbox/"

msdl:
  scenarios_dir: "configs/interop/scenarios/"
  default_environment:
    terrain: "desert"
    weather: "clear"
    time_of_day: "0600"

orbat:
  default_country_code: 178
  default_affiliation: "friendly"
  templates_dir: "configs/interop/orbat_templates/"

exercises:
  max_concurrent: 3
  auto_record: true
  report_generation_llm_domain: "planning"  # Mistral

coalition:
  gcc_partners:
    - {code: 178, iso3: "SAU", name: "Saudi Arabia", callsign: "FALCON"}
    - {code: 223, iso3: "ARE", name: "United Arab Emirates", callsign: "HAWK"}
    - {code: 117, iso3: "KWT", name: "Kuwait", callsign: "DESERT"}
    - {code: 16, iso3: "BHR", name: "Bahrain", callsign: "PEARL"}
    - {code: 164, iso3: "QAT", name: "Qatar", callsign: "ORYX"}
    - {code: 154, iso3: "OMN", name: "Oman", callsign: "SHIELD"}
  nato_partners:
    - {code: 225, iso3: "USA", name: "United States", callsign: "EAGLE"}
    - {code: 224, iso3: "GBR", name: "United Kingdom", callsign: "LANCER"}
    - {code: 71, iso3: "FRA", name: "France", callsign: "TRIDENT"}
    - {code: 78, iso3: "DEU", name: "Germany", callsign: "IRON"}
    - {code: 105, iso3: "ITA", name: "Italy", callsign: "ROMA"}
    - {code: 198, iso3: "ESP", name: "Spain", callsign: "TORO"}
    - {code: 222, iso3: "TUR", name: "Turkey", callsign: "ANKA"}
    - {code: 39, iso3: "CAN", name: "Canada", callsign: "MAPLE"}
    - {code: 145, iso3: "NLD", name: "Netherlands", callsign: "ORANGE"}
    - {code: 146, iso3: "NOR", name: "Norway", callsign: "VIKING"}

nffi:
  transport_profile: "IP-1"
  gateway_url: null
  publish_interval_seconds: 10
  track_source_country: "SAU"
  system_id: "S3M-FALCON"
  outbox_dir: "data/interop/nffi_outbox/"
  stale_threshold_seconds: 300

uas4586:
  max_loi: 3
  registered_uavs: []
  publish_interval_seconds: 1

mtf:
  namespace: "urn:nato:mtf:app11d"
  originator: "S3M INTEL CENTER"
  start_serial: 1
  gateway_url: null

verification:
  auto_run_on_startup: false
  coordinate_accuracy_threshold_meters: 1.0

taxii:
  servers: []
  poll_interval_seconds: 300
  outbox_dir: "data/interop/taxii_outbox/"
  inbox_dir: "data/interop/taxii_inbox/"
  auto_contribute: false
