# Development profile — all features enabled, security relaxed
system:
  deployment_mode: "development"
middleware:
  auth_enabled: false
  rate_limit_rpm: 600
  cors_lockdown: false
jetson:
  simulated_mode: true
memory:
  total_budget_gb: 256  # was 48, now needs 256 for full quad
startup:
  skip_on_memory_pressure: []
