# S3M API Integration — Provider Configuration
# UNCLASSIFIED - FOUO

global:
  default_mode: "online"  # "online" or "airgapped"
  default_timeout_seconds: 30
  default_max_retries: 3
  cache_ttl_seconds: 3600
  data_dir: "data/integrations/"

# Providers are registered here. Each gets enabled/disabled independently.
# Credentials come from environment variables — NEVER from this file.
providers:
  geoint-copernicus:
    enabled: true
    mode: "online"
    rate_limit_rpm: 30
  geoint-sentinelhub:
    enabled: true
    mode: "online"
    rate_limit_rpm: 120
  geoint-nasa-earthdata:
    enabled: true
    mode: "online"
    rate_limit_rpm: 10
  geoint-gee:
    enabled: true
    mode: "online"
    rate_limit_rpm: 20
  osint-gdelt:
    enabled: true
    mode: "online"
    rate_limit_rpm: 30
  osint-acled:
    enabled: true
    mode: "online"
    rate_limit_rpm: 5
  osint-mediacloud:
    enabled: true
    mode: "online"
    rate_limit_rpm: 40
  osint-intelligencex:
    enabled: true
    mode: "online"
    rate_limit_rpm: 3
