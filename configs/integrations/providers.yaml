# S3M API Integration — Provider Configuration
# UNCLASSIFIED - FOUO

global:
  default_mode: "online"  # "online" or "airgapped"
  default_timeout_seconds: 30
  default_max_retries: 3
  cache_ttl_seconds: 3600
  data_dir: "data/integrations/"

# Providers are registered here. Each gets enabled/disabled independently.
# Credentials come from environment variables — NEVER from this file.
providers:
  geoint-copernicus:
    enabled: true
    mode: "online"
    rate_limit_rpm: 30
  geoint-sentinelhub:
    enabled: true
    mode: "online"
    rate_limit_rpm: 120
  geoint-nasa-earthdata:
    enabled: true
    mode: "online"
    rate_limit_rpm: 10
  geoint-gee:
    enabled: true
    mode: "online"
    rate_limit_rpm: 20
  cyber-misp:
    enabled: true
    mode: "online"
    rate_limit_rpm: 60
  cyber-opencti:
    enabled: true
    mode: "online"
    rate_limit_rpm: 30
  cyber-virustotal:
    enabled: true
    mode: "online"
    rate_limit_rpm: 4
  cyber-abuseipdb:
    enabled: true
    mode: "online"
    rate_limit_rpm: 20
  cyber-greynoise:
    enabled: true
    mode: "online"
    rate_limit_rpm: 3
