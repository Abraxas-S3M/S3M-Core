# S3M Phase 6 — Autonomy & Swarm Configuration
# UNCLASSIFIED - FOUO

rl:
  backend: "auto"  # "rllib", "sb3", or "builtin"
  default_algorithm: "PPO"
  training:
    default_steps: 10000
    learning_rate: 0.0003
    batch_size: 64
    gamma: 0.99
  policies_dir: "models/policies/"

behavior_trees:
  tick_rate_hz: 10.0
  max_ticks: 10000
  missions_dir: "configs/missions/"
  llm_replan_domain: "tactical"
  llm_replan_timeout_ms: 5000

swarm:
  max_agents: 50
  default_formation: "wedge"
  default_spacing_meters: 20.0
  command_ttl_seconds: 60.0
  max_command_history: 1000
  heartbeat_timeout_seconds: 30
  nl_command:
    default_language: "en"
    arabic_engine: "allam"
    english_engine: "phi3"

xai:
  risk_threshold: 0.7
  confidence_threshold: 0.3
  max_decision_log: 50000
  auto_flag_engage: true
  always_review_strike: true
  export_dir: "data/decision_logs/"
