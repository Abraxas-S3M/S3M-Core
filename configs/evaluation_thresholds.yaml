# S3M Evaluation Thresholds — Build-gate configuration
global:
  fail_on_any_violation: true
  report_format: "json"    # json | markdown

models:
  phi3-mini:
    latency:
      p50_ms: 2000
      p95_ms: 5000
      p99_ms: 8000
    memory:
      max_rss_mb: 4096
      max_vram_mb: 0       # 0 = CPU-only check
    accuracy:
      min_exact_match_pct: 60.0
      min_f1_pct: 70.0
      regression_tolerance_pct: 5.0  # allowed drop from baseline
    quantization_quality:
      max_perplexity_increase_pct: 15.0
      min_rouge_l_vs_fp16: 0.80
      min_cosine_sim_vs_fp16: 0.92

