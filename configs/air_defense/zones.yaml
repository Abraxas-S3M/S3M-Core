# S3M Default Defense Zone Templates
# UNCLASSIFIED - FOUO

echelon_defaults:
  close:
    inner_radius_m: 0
    outer_radius_m: 10000
    min_altitude_m: 0
    max_altitude_m: 3000
    priority: 1

  short:
    inner_radius_m: 10000
    outer_radius_m: 20000
    min_altitude_m: 0
    max_altitude_m: 8000
    priority: 2

  medium:
    inner_radius_m: 20000
    outer_radius_m: 40000
    min_altitude_m: 0
    max_altitude_m: 15000
    priority: 3

  extended:
    inner_radius_m: 20000
    outer_radius_m: 40000
    min_altitude_m: 0
    max_altitude_m: 12000
    priority: 4

# Saudi template zones for common defended assets
saudi_templates:
  oil_refinery:
    name_en: "Oil Refinery Defense"
    name_ar: "دفاع المصفاة"
    echelons: [close, short, medium, extended]

  airbase:
    name_en: "Airbase Defense"
    name_ar: "دفاع القاعدة الجوية"
    echelons: [close, short, medium, extended]

  port_facility:
    name_en: "Port Facility Defense"
    name_ar: "دفاع المنشأة المينائية"
    echelons: [close, short, medium]

  command_post:
    name_en: "Command Post Defense"
    name_ar: "دفاع مركز القيادة"
    echelons: [close, short]
